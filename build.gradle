spotless {
  enforceCheck = false
  java {
    target 'src/**/*.java'
    bumpThisNumberIfACustomStepChanges(2)
    custom('googleJavaFormat') { source ->
      def javaExecutable = new File(System.getProperty('java.home'), 'bin/java').absolutePath
      def classpath =
        configurations.googleJavaFormatTool.files.collect { it.absolutePath }.join(File.pathSeparator)
      def process =
        new ProcessBuilder(
            [javaExecutable] +
              googleJavaFormatJvmArgs +
              ['-cp', classpath, 'com.google.googlejavaformat.java.Main', '-'])
          .start()
      def stdout = new StringBuilder()
      def stderr = new StringBuilder()
      process.consumeProcessOutput(stdout, stderr)
      process.outputStream.withWriter('UTF-8') { it.write(source) }
      process.outputStream.close()
      def exitCode = process.waitFor()
      if (exitCode != 0) {
        throw new GradleException("google-java-format failed: ${stderr}".trim())
      }
      return stdout.toString()
    }
  }
  format('misc') {
    target '*.gradle', '*.md', '.gitattributes', '.gitignore', '.github/**/*.yml', 'gradle.properties', 'gradle/**/*.toml'
    trimTrailingWhitespace()
    endWithNewline()
  }
}
