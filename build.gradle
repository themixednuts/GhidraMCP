String normalizeVersion(String value) {
  if (!value) {
    return null
  }
  def matcher = value =~ /(\d+\.\d+(?:\.\d+)?)/
  matcher.find() ? matcher.group(1) : null
}

Object fetchJson(String apiUrl, String description) {
  HttpURLConnection connection = (HttpURLConnection) new URL(apiUrl).openConnection()
  connection.setRequestMethod('GET')
  connection.setRequestProperty('Accept', 'application/vnd.github.v3+json')
  connection.setRequestProperty('User-Agent', 'GhidraMCP-Gradle-Bootstrap')

  def githubToken = System.getenv('GITHUB_TOKEN')?.trim()
  if (githubToken) {
    connection.setRequestProperty('Authorization', "Bearer ${githubToken}")
  }

  int status = connection.responseCode
  if (status >= 400) {
    def details =
      connection.errorStream != null ? connection.errorStream.getText('UTF-8') : 'no response body'
    throw new GradleException("Failed to fetch ${description} (HTTP ${status}): ${details}")
  }

  new JsonSlurper().parse(connection.inputStream)
}

Map<String, String> resolveGhidraRelease(String requestedSelector) {
  String selector = requestedSelector?.trim()
  if (!selector) {
    selector = project.property('ghidraVersion').toString()
  }

  boolean useLatest = selector.equalsIgnoreCase('latest')
  def releaseInfo
  String ghidraVersion

  if (useLatest) {
    logger.lifecycle('Fetching latest Ghidra release metadata...')
    releaseInfo =
      fetchJson(
        'https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/latest',
        'latest Ghidra release metadata')
    ghidraVersion = normalizeVersion(releaseInfo.tag_name?.toString())
  } else {
    ghidraVersion = normalizeVersion(selector)
    if (!ghidraVersion) {
      throw new GradleException(
        "Invalid Ghidra release selector '${selector}'. Use 'latest', '12.0.4', or 'Ghidra_12.0.4_build'.")
    }

    String tagName = selector.startsWith('Ghidra_') ? selector : "Ghidra_${ghidraVersion}_build"
    logger.lifecycle("Fetching Ghidra release metadata for ${tagName}...")
    releaseInfo =
      fetchJson(
        "https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/tags/${tagName}",
        "Ghidra release metadata for ${tagName}")
  }

  if (!ghidraVersion) {
    throw new GradleException("Unable to resolve Ghidra version from release metadata: ${releaseInfo}")
  }

  def zipAsset = releaseInfo.assets?.find { asset ->
    def name = asset?.name?.toString()?.toLowerCase()
    name != null && name ==~ /ghidra_.*_public_.*\.zip/
  }
  if (!zipAsset) {
    throw new GradleException(
      "Could not find a Ghidra PUBLIC zip asset in release ${releaseInfo.tag_name}")
  }

  String zipName = zipAsset.name.toString()
  def dateMatch = zipName =~ /(?i)PUBLIC_(\d+)\.zip$/
  String releaseDate = dateMatch.find() ? dateMatch.group(1) : 'unknown'

  [
    requestedSelector: selector,
    mode: useLatest ? 'latest' : 'pinned',
    version: ghidraVersion,
    tag: releaseInfo.tag_name.toString(),
    zipName: zipName,
    releaseDate: releaseDate,
    downloadUrl: zipAsset.browser_download_url.toString(),
  ]
}

