tasks.register('bootstrapGhidra') {
  group = 'build setup'
  description = 'Downloads the selected official Ghidra release and extracts the compile-only jars into lib/.'

  inputs.property('ghidraReleaseSelector', ghidraReleaseSelector)
  outputs.files(ghidraJarNames.collect { layout.projectDirectory.file("lib/${it}") })
  outputs.file(layout.projectDirectory.file('lib/.ghidra-bootstrap.properties'))

  doLast {
    def libDir = layout.projectDirectory.dir('lib').asFile
    def cacheDir = layout.projectDirectory.dir('.cache').asFile
    def metadataFile = layout.projectDirectory.file('lib/.ghidra-bootstrap.properties').asFile

    libDir.mkdirs()
    cacheDir.mkdirs()

    def existing = new Properties()
    if (metadataFile.exists()) {
      metadataFile.withInputStream { existing.load(it) }
    }

    boolean hasAllJars = ghidraJarNames.every { new File(libDir, it).exists() }
    if (hasAllJars &&
      metadataFile.exists() &&
      ghidraReleaseSelector != 'latest' &&
      existing.getProperty('ghidra.bootstrap.version') == effectiveGhidraVersion &&
      existing.getProperty('ghidra.bootstrap.selector') == ghidraReleaseSelector) {
      logger.lifecycle("Ghidra jars already bootstrapped for ${effectiveGhidraVersion}.")
      return
    }

    def release = resolveGhidraRelease(ghidraReleaseSelector)

    if (ghidraReleaseSelector != 'latest' && release.version != effectiveGhidraVersion) {
      throw new GradleException(
        "Resolved Ghidra version ${release.version} differs from configured ghidraVersion ${effectiveGhidraVersion}. " +
          "Re-run with -PghidraVersion=${release.version} or set -PghidraRelease=${effectiveGhidraVersion}.")
    }

    def zipFile = new File(cacheDir, release.zipName)
    if (!zipFile.exists()) {
      logger.lifecycle("Downloading ${release.zipName}...")
      HttpURLConnection connection = (HttpURLConnection) new URL(release.downloadUrl).openConnection()
      connection.setRequestProperty('User-Agent', 'GhidraMCP-Gradle-Bootstrap')
      def githubToken = System.getenv('GITHUB_TOKEN')?.trim()
      if (githubToken) {
        connection.setRequestProperty('Authorization', "Bearer ${githubToken}")
      }
      connection.connect()
      if (connection.responseCode >= 400) {
        def details =
          connection.errorStream != null ? connection.errorStream.getText('UTF-8') : 'no response body'
        throw new GradleException(
          "Failed to download ${release.zipName} (HTTP ${connection.responseCode}): ${details}")
      }
      zipFile.withOutputStream { out ->
        connection.inputStream.withStream { inStream ->
          out << inStream
        }
      }
    }

    delete(fileTree(libDir) { include '*.jar' })

    copy {
      from(zipTree(zipFile)) {
        include ghidraZipIncludes
        eachFile { path = name }
        includeEmptyDirs = false
      }
      into libDir
    }

    metadataFile.text =
      """ghidra.bootstrap.version=${release.version}
ghidra.bootstrap.releaseDate=${release.releaseDate}
ghidra.bootstrap.tag=${release.tag}
ghidra.bootstrap.selector=${release.requestedSelector}
ghidra.bootstrap.mode=${release.mode}
ghidra.bootstrap.zip=${release.zipName}
"""

    logger.lifecycle("Ghidra ${release.version} jars ready in ${libDir}.")
  }
}

tasks.withType(JavaCompile).configureEach {
  dependsOn tasks.named('bootstrapGhidra')
  options.encoding = 'UTF-8'
  options.release = 21
}

tasks.named('processResources') {
  dependsOn tasks.named('bootstrapGhidra')
  duplicatesStrategy = DuplicatesStrategy.INCLUDE
  filteringCharset = 'UTF-8'

  filesMatching('extension.properties') {
    expand(project: extensionProjectMetadata, ghidra: extensionGhidraMetadata)
  }

  exclude 'META-INF/MANIFEST.MF'
  from('Module.manifest')
}

tasks.named('jar') {
  archiveFileName = 'GhidraMCP.jar'
  destinationDirectory = layout.buildDirectory
  duplicatesStrategy = DuplicatesStrategy.EXCLUDE
  exclude '**/App.class'
  manifest {
    from 'src/main/resources/META-INF/MANIFEST.MF'
  }
}

def syncExtensionLibs =
  tasks.register('syncExtensionLibs', Sync) {
    dependsOn tasks.named('jar')
    from(configurations.runtimeClasspath)
    into(layout.buildDirectory.dir('extension-lib'))
  }

def extensionZip =
  tasks.register('extensionZip', Zip) {
    group = 'distribution'
    description = 'Builds the installable Ghidra extension zip.'
    dependsOn tasks.named('jar')
    dependsOn syncExtensionLibs
    dependsOn tasks.named('processResources')

    archiveFileName = "GhidraMCP-${project.version}.zip"
    destinationDirectory = layout.buildDirectory
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    from(tasks.named('processResources')) {
      include 'extension.properties'
      include 'Module.manifest'
      into project.name
    }

    from(tasks.named('jar')) {
      into "${project.name}/lib"
    }

    from(syncExtensionLibs) {
      into "${project.name}/lib"
    }
  }

tasks.named('assemble') {
  dependsOn extensionZip
}

tasks.register('bootstrap') {
  group = 'build setup'
  description = 'Alias for bootstrapGhidra.'
  dependsOn tasks.named('bootstrapGhidra')
}

tasks.register('package') {
  group = 'build'
  description = 'Builds the installable Ghidra extension zip.'
  dependsOn extensionZip
}

