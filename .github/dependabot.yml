version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 4
    labels:
      - "dependencies"
      - "java"
    commit-message:
      prefix: "build(deps)"
    ignore:
      - dependency-name: "io.modelcontextprotocol.sdk:*"
        update-types:
          - "version-update:semver-major"
    groups:
      runtime-dependencies:
        patterns:
          - "io.modelcontextprotocol.sdk:*"
          - "com.fasterxml.jackson.*:*"
          - "jakarta.servlet:*"
          - "org.eclipse.jetty:*"
          - "org.eclipse.jetty.ee10:*"
      test-dependencies:
        patterns:
          - "org.netbeans.external:*"
          - "msv:*"
          - "org.jdom:*"
          - "org.antlr:*"
          - "com.google.guava:*"
          - "org.apache.commons:*"
          - "commons-*"
          - "com.google.code.gson:*"
          - "javax.help:*"
          - "org.reflections:*"
          - "org.junit.jupiter:*"
          - "org.junit.platform:*"
          - "org.mockito:*"
          - "org.slf4j:*"
          - "com.github.erosb:*"
          - "org.json:*"
      build-dependencies:
        patterns:
          - "com.diffplug:*"
          - "gradle"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
    groups:
      github-actions:
        patterns:
          - "*"
