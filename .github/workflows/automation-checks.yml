name: Automation Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: automation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  wrapper-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: gradle/actions/wrapper-validation@v6.1.0

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install actionlint
        run: |
          curl -sSL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz \
            | tar -xz
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Lint workflows
        run: actionlint -color
