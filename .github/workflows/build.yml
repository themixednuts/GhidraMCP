name: Build with Gradle

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v5

      - name: Build with Gradle
        run: ./gradlew ci

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: GhidraMCP-test-reports
          path: |
            target/test-results/test/**
            target/test-results/e2eTest/**
            target/reports/tests/test/**
            target/reports/tests/e2eTest/**
            target/reports/problems/problems-report.html
          if-no-files-found: ignore

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: GhidraMCP-artifact
          path: target/GhidraMCP-*.zip
          if-no-files-found: error
          compression-level: 0

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: GhidraMCP-artifact
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
